# ─────────────────────────────────────────────────────────────────────────────
# settings.conf — Central configuration for Linux System Automation
# Edit these values to match your environment before running any scripts.
# ─────────────────────────────────────────────────────────────────────────────

# ── Backup Settings ──────────────────────────────────────────────────────────
BACKUP_SOURCE="/home"                        # What to back up
BACKUP_DEST="/var/backups/linux-automation"  # Where backups go
BACKUP_RETAIN_DAYS=7                         # How many days of backups to keep

# ── Log Management ───────────────────────────────────────────────────────────
LOG_DIR="/var/log/linux-automation"          # Where our script logs live
LOG_RETAIN_DAYS=14                           # Days before old logs are cleaned up
APP_LOG_DIR="/var/log"                       # System log directory to rotate

# ── Monitoring Thresholds ────────────────────────────────────────────────────
DISK_THRESHOLD=80                            # Alert if disk usage % exceeds this
CPU_THRESHOLD=85                             # Alert if CPU usage % exceeds this
MEM_THRESHOLD=80                             # Alert if memory usage % exceeds this

# ── Alert Settings ───────────────────────────────────────────────────────────
ALERT_EMAIL=""                               # Set your email here to receive alerts
                                             # Leave blank to skip email alerts

# ── User Provisioning ────────────────────────────────────────────────────────
DEFAULT_SHELL="/bin/bash"                    # Default shell for new users
DEFAULT_GROUP="developers"                   # Default group for new users
PASSWORD_LENGTH=16                           # Length of auto-generated passwords

# ── Project Meta ─────────────────────────────────────────────────────────────
PROJECT_NAME="Linux System Automation"
SCRIPT_VERSION="1.0.0"